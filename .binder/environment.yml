name: hcipy
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.10
  - pip
  - numpy
  - scipy
  - matplotlib>=2.0.0
  - pillow
  - pyyaml
  - astropy
  - imageio
  - xxhash
  - numexpr
  - asdf
  - tqdm
  # Doc dependencies
  - numpydoc
  - sphinx_rtd_theme
  - nbsphinx
  - jupyter_client
  - ipykernel
  - poppy
  - nbclient
  - nbformat
  - nbconvert
  - sphinx-automodapi
  - ipywidgets
  - pip:
    # Install hcipy from the repository
    - -e .
